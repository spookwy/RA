<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Закрытие</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #18181b;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .dialog {
      background: #18181b;
      padding: 28px 32px 24px;
      width: 100%;
      position: relative;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .title {
      color: #fafafa;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #71717a;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #3f3f46;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      outline: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-hide {
      background: #27272a;
      color: #e4e4e7;
    }
    .btn-hide:hover {
      background: #3f3f46;
      border-color: #52525b;
    }
    .btn-quit {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }
    .btn-quit:hover {
      background: #ef4444;
      border-color: #ef4444;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #10b981;
      cursor: pointer;
      border-radius: 4px;
    }
    .checkbox-row label {
      color: #a1a1aa;
      font-size: 12px;
      cursor: pointer;
    }
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #71717a;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.15s ease;
      line-height: 1;
    }
    .close-btn:hover {
      background: #27272a;
      color: #e4e4e7;
    }
  </style>
</head>
<body>
  <div class="dialog">
    <button class="close-btn" id="btn-close" title="Закрыть">&times;</button>
    <div class="title">Закрытие приложения</div>
    <div class="subtitle">Выберите действие при закрытии окна</div>
    <div class="buttons">
      <button class="btn btn-hide" id="btn-hide">
        Свернуть
      </button>
      <button class="btn btn-quit" id="btn-quit">
        Закрыть полностью
      </button>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="remember" />
      <label for="remember">Запомнить мой выбор</label>
    </div>
  </div>

  <script>
    const remember = document.getElementById('remember');

    document.getElementById('btn-hide').addEventListener('click', () => {
      window.dialogAPI.respond('hide', remember.checked);
    });

    document.getElementById('btn-quit').addEventListener('click', () => {
      window.dialogAPI.respond('quit', remember.checked);
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      window.dialogAPI.respond('cancel', false);
    });

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.dialogAPI.respond('cancel', false);
      }
    });
  </script>
</body>
</html>
