# ============================================
# Nginx config for Remote Admin Panel
# ============================================
# 1. Replace YOUR_DOMAIN with your actual domain
# 2. Place this file at /etc/nginx/sites-available/admin-panel
# 3. sudo ln -s /etc/nginx/sites-available/admin-panel /etc/nginx/sites-enabled/
# 4. sudo certbot --nginx -d YOUR_DOMAIN -d ws.YOUR_DOMAIN
# 5. sudo nginx -t && sudo systemctl reload nginx

# ---- Web Panel (Next.js) ----
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot will add SSL config here after running certbot --nginx
    # For now, redirect HTTP -> HTTPS (uncomment after SSL setup):
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- WebSocket Server ----
server {
    listen 80;
    server_name ws.YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
